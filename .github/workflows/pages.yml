# Build the dashboard as a static export and deploy it to GitHub Pages.
# Pages itself is enabled by the repo admin/orchestrator, not this workflow.
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Data-contract checks
        run: npm run check

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /flashbook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/dashboard/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
